<nz-date-picker
  class="app-date-picker"
  [ngModel]="value()"
  (ngModelChange)="onDateChange($event)"
  [nzPlaceHolder]="placeholder"
  [nzDisabled]="disabled"
  [nzInputReadOnly]="true"
  (nzOnOpenChange)="onOpenChange($event)"
  (click)="onFieldClick()"
  nzFormat="dd/MM/yyyy"
></nz-date-picker>
