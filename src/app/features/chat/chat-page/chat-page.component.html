<div class="shell">

  <!-- Sidebar component -->
  <app-sidebar [collapsed]="collapsed()" (toggleCollapse)="toggleSidebar()" />

  <!-- Main -->
  <div class="main">

    <!-- Header component -->
    <app-chat-header page="Chatbot" [sidebarCollapsed]="collapsed()" (toggleSidebar)="toggleSidebar()" />

    <!-- Chat area -->
    <app-chat-area
      [messages]="chat.messages()"
      [isTyping]="chat.isTyping()"
      [readOnly]="false"
      class="chat-area-host" />

    <!-- Quick action chips -->
    <div class="quick-bar">
      <button class="qchip qchip--blue" (click)="chat.send('สร้าง RGoods')">
        <lucide-icon [img]="icFileCheck" [size]="13" /> ขอใบอนุญาตนำเข้า
      </button>
      <button class="qchip qchip--teal" (click)="chat.send('ดูสถานะใบขน')">
        <lucide-icon [img]="icEye" [size]="13" /> ดูสถานะการยื่นขอใบอนุญาต
      </button>
      <button class="qchip qchip--purple" (click)="goToQueue()">
        <lucide-icon [img]="icUpload" [size]="13" /> จัดการคิวงาน
      </button>
      <button class="qchip qchip--orange" (click)="chat.send('อัปโหลดเอกสาร')">
        <lucide-icon [img]="icUpload" [size]="13" /> อัปโหลดเอกสาร
      </button>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <div class="input-wrap">
        <div class="input-row">
          <button class="input-icon-btn">
            <lucide-icon [img]="icPaperclip" [size]="16" />
          </button>
          <textarea
            nz-input [(ngModel)]="inputText" (keydown)="onKeydown($event)"
            placeholder="พิมพ์คำสั่ง หรือถาม AI..."
            nzAutosize class="chat-textarea">
          </textarea>
          <button class="send-btn" (click)="send()" [disabled]="!inputText.trim()">
            <lucide-icon [img]="icSend" [size]="14" [color]="inputText.trim() ? '#fff' : '#9CA3AF'" />
          </button>
        </div>
        <div class="input-footer">
          <p class="input-hint">Enter ส่ง · Shift+Enter ขึ้นบรรทัดใหม่</p>
        </div>
      </div>
    </div>

  </div>
</div>
