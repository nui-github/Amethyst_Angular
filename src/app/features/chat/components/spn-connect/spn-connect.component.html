<div class="spn-connect">

  <div class="spn-header">
    <p class="spn-header__title">เลือก SPN Profile</p>
    <p class="spn-header__sub">เลือก profile ที่ต้องการใช้งาน ระบบจะดึงข้อมูลใบขนให้อัตโนมัติ</p>
  </div>

  @if (!done) {
    <div class="profile-grid">
      @for (p of profiles; track p.code) {
        <button class="profile-card"
          [class.profile-card--selected]="selected === p.code"
          [disabled]="connecting"
          (click)="select(p.code)">
          <div class="profile-card__badge" [style.background]="p.color + '18'" [style.color]="p.color">
            {{ p.code }}
          </div>
          <div class="profile-card__body">
            <p class="profile-card__name">{{ p.displayName }}</p>
            <p class="profile-card__url">{{ getUrl(p) }}</p>
          </div>
          @if (selected === p.code) {
            <div class="profile-card__check">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            </div>
          }
        </button>
      }
    </div>

    <button class="confirm-btn" [disabled]="!selected || connecting" (click)="confirm()">
      @if (connecting) {
        <span>กำลังเชื่อมต่อ...</span>
      } @else {
        <lucide-icon [img]="ChevronRight" [size]="14" color="#fff" />
        <span>ใช้ Profile นี้</span>
      }
    </button>

  } @else {
    <div class="spn-done">
      <lucide-icon [img]="CheckCircle" [size]="20" color="#0D8F61" />
      <span>เชื่อมต่อ Profile <strong>{{ selected }}</strong> สำเร็จแล้ว — กำลังดึงข้อมูล...</span>
    </div>
  }

</div>
