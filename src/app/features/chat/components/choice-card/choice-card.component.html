<div class="choice-card">
  @if (data.question) {
    <div class="choice-card__q-wrap">
      @if (isSimple) {
        <span class="choice-card__status-dot"></span>
      }
      <p class="choice-card__question" [class.choice-card__question--status]="isSimple">{{ data.question }}</p>
    </div>
  }

  <!-- Rich cards when options have descriptions -->
  @if (!isSimple) {
    <div class="choice-options" [class.choice-options--col]="data.options.length > 2">
      @for (opt of data.options; track opt.value; let i = $index) {
        <button class="option-card" [class.option-card--primary]="i === 0"
          (click)="chosen.emit(opt.value)">
          <span class="option-card__icon" [class.option-card__icon--primary]="i === 0">
            <!-- Inline SVG database icon for 'spn', upload for others -->
            @if (opt.value === 'spn') {
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
            } @else if (opt.value === 'upload') {
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            } @else if (opt.value === 'email') {
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            } @else if (opt.value === 'preview') {
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            } @else {
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            }
          </span>
          <span class="option-card__body">
            <span class="option-card__label">{{ opt.label }}</span>
            @if (opt.description) {
              <span class="option-card__desc">{{ opt.description }}</span>
            }
          </span>
          <svg class="option-card__arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      }
    </div>

  <!-- Simple action buttons when no descriptions -->
  } @else {
    <div class="action-buttons">
      @for (opt of data.options; track opt.value; let i = $index) {
        <button class="action-btn"
          [class.action-btn--primary]="i === 0"
          [class.action-btn--secondary]="i !== 0"
          (click)="chosen.emit(opt.value)">
          @if (i === 0) {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          } @else {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          }
          {{ opt.label }}
        </button>
      }
    </div>
  }
</div>
