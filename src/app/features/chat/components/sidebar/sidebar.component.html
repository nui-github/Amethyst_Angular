<aside class="sidebar" [class.sidebar--collapsed]="collapsed">

  <!-- Logo bar -->
  <div class="sb-logo">
    <div class="bx-badge">BX</div>
    <div class="sb-logo-name">
      <p class="sb-name">Netbay Agent</p>
      <p class="sb-sub">Assistant</p>
    </div>
    <button class="toggle-btn" (click)="toggleCollapse.emit()">
      <lucide-icon [img]="collapsed ? icChevR : icChevL" [size]="13" color="#B0B4C4" />
    </button>
  </div>

  <!-- Scrollable nav area -->
  <div class="sb-nav">

    <!-- New Chat -->
    <div class="sb-section">
      <button class="new-chat-btn" (click)="newChat()" [title]="collapsed ? 'New Chat' : ''">
        <lucide-icon [img]="icPlus" [size]="14" />
        @if (!collapsed) { <span>New Chat</span> }
      </button>
    </div>

    <!-- เครื่องมือ -->
    <div class="sb-section">
      @if (!collapsed) { <p class="sb-label">เครื่องมือ</p> }
      <button class="nav-item" [class.nav-item--active]="isChat()" (click)="goChat()" [title]="collapsed ? 'Chatbot' : ''">
        <lucide-icon [img]="icMessage" [size]="15" />
        @if (!collapsed) { <span>Chatbot</span> }
      </button>
      <button class="nav-item" [class.nav-item--active]="isQueue()" (click)="goQueue()" [title]="collapsed ? 'คิวงาน' : ''">
        <lucide-icon [img]="icList" [size]="15" />
        @if (!collapsed) { <span>คิวงาน</span> }
        @if (queue.needsYouCount() > 0) {
          <span class="nav-badge">{{ queue.needsYouCount() }}</span>
        }
      </button>
      <button class="nav-item nav-item--expand" [title]="collapsed ? 'Dashboard' : ''">
        <lucide-icon [img]="icDash" [size]="15" />
        @if (!collapsed) { <span>Dashboard</span><lucide-icon [img]="icChevR" [size]="13" class="nav-chevron" /> }
      </button>
    </div>

    <!-- เอกสาร -->
    @if (!collapsed) {
      <div class="sb-section">
        <p class="sb-label">เอกสาร</p>
        <button class="nav-item nav-item--expand"><lucide-icon [img]="icLicense" [size]="15" /><span>ใบอนุญาต</span><lucide-icon [img]="icChevR" [size]="13" class="nav-chevron" /></button>
        <button class="nav-item nav-item--expand"><lucide-icon [img]="icRGoods" [size]="15" /><span>RGoods</span><lucide-icon [img]="icChevR" [size]="13" class="nav-chevron" /></button>
        <button class="nav-item nav-item--expand"><lucide-icon [img]="icCustoms" [size]="15" /><span>ใบขน</span><lucide-icon [img]="icChevR" [size]="13" class="nav-chevron" /></button>
        <button class="nav-item nav-item--expand"><lucide-icon [img]="icAnalytics" [size]="15" /><span>Analytics</span><lucide-icon [img]="icChevR" [size]="13" class="nav-chevron" /></button>
        <button class="nav-item"><lucide-icon [img]="icMore" [size]="15" /><span>More</span></button>
      </div>
    }

  </div>

  <!-- Footer: settings + BizX logo -->
  <div class="sb-footer">

    <!-- Settings -->
    <button class="settings-btn" [title]="collapsed ? 'ตั้งค่า' : ''">
      <lucide-icon [img]="icSettings" [size]="14" />
      @if (!collapsed) { <span>ตั้งค่า</span> }
    </button>

    <!-- BizX logo — full or icon only -->
    <a href="https://bizx-uat.devnetbay.com/" target="_blank" rel="noopener" class="bizx-logo-btn">
      @if (!collapsed) {
        <!-- Full BizX wordmark SVG -->
        <svg class="bizx-logo-full" viewBox="0 0 778 496" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M595 143L645 74.5H675L363.5 496H332L495.5 274.5L452 74.5H579L595 143ZM777.5 0L612.5 220L655 422H528L514 355.5L462.5 422H432L746 0H777.5Z" fill="url(#bx-grad-full)"/>
          <path d="M315.245 307.751H383.721V347.649H261.2V309.166L326.847 229.655H261.766V189.758H382.307V228.24L315.245 307.751Z" fill="#010136"/>
          <path d="M210.855 173.347C202.367 173.347 195.387 170.895 189.916 165.99C184.635 160.897 181.994 154.672 181.994 147.315C181.994 139.77 184.635 133.544 189.916 128.64C195.387 123.547 202.367 121 210.855 121C219.155 121 225.946 123.547 231.228 128.64C236.699 133.544 239.434 139.77 239.434 147.315C239.434 154.672 236.699 160.897 231.228 165.99C225.946 170.895 219.155 173.347 210.855 173.347ZM234.907 189.759V347.65H186.521V189.759H234.907Z" fill="#010136"/>
          <path d="M120.257 245.787C131.764 248.24 141.008 253.993 147.987 263.048C154.967 271.914 158.457 282.1 158.457 293.607C158.457 310.208 152.609 323.412 140.913 333.222C129.406 342.842 113.278 347.652 92.5274 347.652H0V149.016H89.4149C109.599 149.016 125.351 153.637 136.669 162.881C148.176 172.124 153.929 184.668 153.929 200.514C153.929 212.21 150.817 221.925 144.592 229.659C138.555 237.393 130.444 242.769 120.257 245.787ZM48.3859 229.376H80.0772C88.0001 229.376 94.0365 227.678 98.1866 224.283C102.525 220.698 104.695 215.511 104.695 208.72C104.695 201.929 102.525 196.741 98.1866 193.157C94.0365 189.573 88.0001 187.781 80.0772 187.781H48.3859V229.376ZM84.0387 308.604C92.1501 308.604 98.3752 306.812 102.714 303.228C107.241 299.455 109.505 294.079 109.505 287.099C109.505 280.12 107.147 274.649 102.431 270.688C97.9036 266.726 91.5842 264.746 83.4727 264.746H48.3859V308.604H84.0387Z" fill="#010136"/>
          <defs>
            <linearGradient id="bx-grad-full" x1="730.169" y1="496.006" x2="304.246" y2="79.8729" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0463EF"/>
              <stop offset="1" stop-color="#16EA9E"/>
            </linearGradient>
          </defs>
        </svg>
      } @else {
        <!-- Icon only: just the X mark -->
        <svg class="bizx-logo-icon" viewBox="430 0 350 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M595 143L645 74.5H675L363.5 496H332L495.5 274.5L452 74.5H579L595 143ZM777.5 0L612.5 220L655 422H528L514 355.5L462.5 422H432L746 0H777.5Z" fill="url(#bx-grad-icon)"/>
          <defs>
            <linearGradient id="bx-grad-icon" x1="730.169" y1="496.006" x2="304.246" y2="79.8729" gradientUnits="userSpaceOnUse">
              <stop stop-color="#0463EF"/>
              <stop offset="1" stop-color="#16EA9E"/>
            </linearGradient>
          </defs>
        </svg>
      }
    </a>

  </div>

</aside>
