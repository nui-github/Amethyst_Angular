<div class="fp-wrap">

  <div class="fp-header">
    <div class="fp-header__icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0463EF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div>
      <p class="fp-header__title">ตรวจสอบข้อมูลก่อนส่งกรม</p>
      <p class="fp-header__sub">กรุณาตรวจสอบข้อมูลทั้งหมดให้ถูกต้องก่อนยืนยัน</p>
    </div>
  </div>

  @for (section of sections; track section.title) {
    <div class="fp-section">
      <div class="fp-section__head" [style.border-left-color]="section.color">
        <span class="fp-section__title">{{ section.title }}</span>
      </div>
      <div class="fp-table">
        @for (row of section.rows; track row.label) {
          <div class="fp-row" [class.fp-row--empty]="!hasValue(row.value)">
            <span class="fp-row__label">{{ row.label }}</span>
            <span class="fp-row__value"
              [class.fp-row__value--highlight]="row.highlight && hasValue(row.value)"
              [class.fp-row__value--empty]="!hasValue(row.value)">
              {{ row.value }}
            </span>
          </div>
        }
      </div>
    </div>
  }

  <div class="fp-footer">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
    </svg>
    <span>ข้อมูลจาก OCR และฟอร์มที่กรอก — กรุณาตรวจสอบความถูกต้องก่อนส่ง</span>
  </div>

</div>
