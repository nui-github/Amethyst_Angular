<div class="ii-wrap">
  <div class="ii-header">
    <div class="ii-header__icon">
      <lucide-icon [img]="Package" [size]="15" color="#0463EF" />
    </div>
    <div>
      <p class="ii-title">เลือกรายการสินค้าที่ต้องการยื่นขอใบอนุญาต</p>
      <p class="ii-sub">เลือกได้มากกว่า 1 รายการ — สำหรับยื่นต่อ <strong>{{ data.agency }}</strong></p>
    </div>
  </div>

  <div class="ii-list">
    @for (item of data.items; track item.id) {
      <button class="ii-item" [class.ii-item--selected]="isSelected(item)" [class.ii-item--locked]="proceeded()"
        [disabled]="proceeded()" (click)="toggle(item)">
        <span class="ii-item__check" [class.ii-item__check--on]="isSelected(item)">
          @if (isSelected(item)) { <lucide-icon [img]="Check" [size]="11" color="#fff" /> }
        </span>
        <span class="ii-item__body">
          <span class="ii-item__name">{{ item.name }}</span>
          <span class="ii-item__meta">
            <span>{{ item.quantity }} {{ item.unit }}</span>
            <span class="ii-item__dot">·</span>
            <span>Lot {{ item.lotNo }}</span>
            <span class="ii-item__dot">·</span>
            <span>HS {{ item.hsCode }}</span>
          </span>
        </span>
        <span class="ii-item__amount">฿{{ item.amount | number }}</span>
      </button>
    }
  </div>

  @if (!proceeded()) {
    <div class="ii-footer">
      <span class="ii-footer__count">เลือกแล้ว {{ selectedCount() }} รายการ</span>
      <button class="ii-proceed-btn" [disabled]="selectedCount() === 0" (click)="proceed()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        ดำเนินการต่อ
      </button>
    </div>
  } @else {
    <div class="ii-footer ii-footer--saved">
      <lucide-icon [img]="Check" [size]="13" color="#0D8F61" />
      เลือกสินค้าแล้ว {{ selectedCount() }} รายการ
    </div>
  }
</div>
